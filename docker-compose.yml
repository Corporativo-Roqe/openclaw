services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - oclaw_ollama_data:/root/.ollama
    networks:
      - dokploy-network

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    depends_on:
      - ollama
    restart: unless-stopped
    environment:
      - OPENCLAW_GATEWAY_TOKEN=9d82b3a1f4e5c6d7a8b90123e4f5a6b7c8d9e0f1
      - OPENCLAW_DEFAULT_PROVIDER=ollama
      - OPENCLAW_DEFAULT_MODEL=gemma4:26b
      - OPENCLAW_OLLAMA_URL=http://ollama:11434
      - OPENCLAW_GATEWAY_TRUST_PROXY=true
      - OPENCLAW_GATEWAY_PUBLIC_URL=https://openclaw.fnconsultorias.com.mx
      - OPENCLAW_GATEWAY_CONTROLUI_ALLOWALLORIGINS=true
    volumes:
      - oclaw_config_v10:/home/node/.openclaw
    networks:
      - dokploy-network

volumes:
  oclaw_ollama_data:
  oclaw_config_v10:

networks:
  dokploy-network:
    external: true
