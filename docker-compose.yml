services:
  ollama:
    image: ollama/ollama:latest
    container_name: oclaw-ai-engine
    restart: unless-stopped
    volumes:
      - oclaw_ollama_data:/root/.ollama
    networks:
      - dokploy-network

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: oclaw-gateway
    depends_on:
      - ollama
    restart: unless-stopped
    environment:
      - OPENCLAW_GATEWAY_TOKEN=9d82b3a1f4e5c6d7a8b90123e4f5a6b7c8d9e0f1
      - OPENCLAW_DEFAULT_PROVIDER=ollama
      - OPENCLAW_DEFAULT_MODEL=gemma4:26b
      - OPENCLAW_OLLAMA_URL=http://ollama:11434
      
      # CONFIGURACIÓN PARA DOKPLOY / TRAEFIK
      - OPENCLAW_GATEWAY_TRUST_PROXY=true
      - OPENCLAW_GATEWAY_PUBLIC_URL=https://openclaw.fnconsultorias.com.mx
      
      # SEGURIDAD: FORMATO 1 (CON GUIONES)
      - OPENCLAW_GATEWAY_CONTROL_UI_ALLOWED_ORIGINS=https://openclaw.fnconsultorias.com.mx,wss://openclaw.fnconsultorias.com.mx
      - OPENCLAW_GATEWAY_CONTROL_UI_DANGEROUSLY_ALLOW_HOST_HEADER_ORIGIN_FALLBACK=true
      
      # SEGURIDAD: FORMATO 2 (TODO JUNTO) POR COMPATIBILIDAD
      - OPENCLAW_GATEWAY_CONTROLUI_ALLOWEDORIGINS=https://openclaw.fnconsultorias.com.mx,wss://openclaw.fnconsultorias.com.mx
      - OPENCLAW_GATEWAY_CONTROLUI_DANGEROUSLYALLOWHOSTHEADERORIGINFALLBACK=true
      
    volumes:
      # Volumen v20 para asegurar inicio totalmente limpio
      - oclaw_config_v20:/home/node/.openclaw
    networks:
      - dokploy-network

volumes:
  oclaw_ollama_data:
  oclaw_config_v20:

networks:
  dokploy-network:
    external: true
