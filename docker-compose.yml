services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - oclaw_ollama_data:/root/.ollama
    networks:
      - dokploy-network

  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    depends_on:
      - ollama
    restart: unless-stopped
    environment:
      - OPENCLAW_GATEWAY_TOKEN=9d82b3a1f4e5c6d7a8b90123e4f5a6b7c8d9e0f1
      - OPENCLAW_DEFAULT_PROVIDER=ollama
      - OPENCLAW_DEFAULT_MODEL=gemma4:26b
      - OPENCLAW_OLLAMA_URL=http://ollama:11434
      
      # CONFIGURACIÓN DE SEGURIDAD 2026 PARA PROXY
      - OPENCLAW_GATEWAY_TRUST_PROXY=true
      - OPENCLAW_GATEWAY_PUBLIC_URL=https://openclaw.fnconsultorias.com.mx
      
      # Nota la diferencia: CONTROL_UI (con guion bajo) y ALLOWED_ORIGINS
      - OPENCLAW_GATEWAY_CONTROL_UI_ALLOWED_ORIGINS=https://openclaw.fnconsultorias.com.mx,wss://openclaw.fnconsultorias.com.mx
      
      # El "Safe Mode" para forzar la entrada:
      - OPENCLAW_GATEWAY_CONTROL_UI_DANGEROUSLY_ALLOW_HOST_HEADER_ORIGIN_FALLBACK=true
      
    volumes:
      # CAMBIAMOS AL VOLUMEN V15: Para que el sistema se vea obligado a leer estas nuevas reglas
      - oclaw_config_v15:/home/node/.openclaw
    networks:
      - dokploy-network

volumes:
  ollama_data:
  # Nuevo volumen limpio
  oclaw_config_v15:

networks:
  dokploy-network:
    external: true
